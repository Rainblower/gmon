name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          mkdir -p build
          platforms=(
            "windows/amd64"
            "windows/arm64"
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="build/gmon_${GOOS}_${GOARCH}"
            [ "$GOOS" = "windows" ] && output+=".exe"
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w" -o "$output" .
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
